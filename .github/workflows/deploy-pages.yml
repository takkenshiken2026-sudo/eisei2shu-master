# GitHub Pages（GitHub Actions）— リポジトリに q/ を載せずにデプロイする
# リポジトリ Settings → Pages → Source を「GitHub Actions」にしてください。
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate JS and static question pages
        run: |
          python3 tools/csv_to_eisei2_master.py -o eisei2-master-data.js
          python3 tools/build_question_pages.py

      - name: Bundle public files
        run: bash tools/prepare_public_site.sh

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
