<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<meta name="description" content="{{description}}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{canonical}}">

<!-- OGP -->
<meta property="og:type" content="article">
<meta property="og:url" content="{{canonical}}">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{description}}">
<meta property="og:locale" content="ja_JP">
<meta property="og:site_name" content="二衛マスター">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{title}}">
<meta name="twitter:description" content="{{description}}">

<!-- 構造化データ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Article",
      "@id": "{{canonical}}#article",
      "headline": "{{title}}",
      "description": "{{description}}",
      "dateModified": "{{updated}}",
      "inLanguage": "ja",
      "isPartOf": {"@id": "{{site_url}}/#website"},
      "about": {
        "@type": "EducationalOccupationalCredential",
        "name": "第二種衛生管理者"
      }
    },
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type": "ListItem", "position": 1, "name": "トップ", "item": "{{site_url}}/"},
        {"@type": "ListItem", "position": 2, "name": "用語解説", "item": "{{site_url}}/terms/"},
        {"@type": "ListItem", "position": 3, "name": "{{h1}}", "item": "{{canonical}}"}
      ]
    }
  ]
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script defer src="/site-analytics.js"></script>

<style>
:root {
  --bg: #ffffff;
  --bg2: #f4f4f5;
  --bg3: #e4e4e7;
  --text: #121212;
  --text2: #555555;
  --text3: #999999;
  --ink: #333333;
  --table-head-bg: #2b2b2b;
  --border: rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.18);
  --green: #1a7a40;
  --grn-s: #f0fdf4;
  --red: #c0392b;
  --red-s: #fdf2f2;
  --font: 'Noto Sans JP', sans-serif;
  --r: 6px;
  --r2: 10px;
  --sh: 0 1px 3px rgba(0,0,0,0.07);
  --max-w: 840px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); font-size: 16px; line-height: 1.8; background: #f0f0f1; color: var(--text); -webkit-font-smoothing: antialiased; }

/* ===== HEADER ===== */
.site-header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.site-header-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-back {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--text3);
  text-decoration: none;
  padding: 6px 10px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--bg);
  transition: all .15s;
}
.header-back:hover { background: var(--bg2); color: var(--text); }
.header-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.header-logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
}
.header-sep { color: var(--text3); font-size: 13px; }

/* ===== LAYOUT ===== */
.page-wrap {
  max-width: var(--max-w);
  margin: 24px auto;
  padding: 36px 48px 64px;
  background: #ffffff;
  border-radius: var(--r2);
  box-shadow: var(--sh);
}
@media(max-width: 760px) {
  .page-wrap { margin: 0; border-radius: 0; padding: 24px 20px 60px; box-shadow: none; }
}

/* ===== BREADCRUMB ===== */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.breadcrumb a { color: var(--text3); text-decoration: none; }
.breadcrumb a:hover { color: var(--text); }
.breadcrumb-sep { font-size: 10px; }

/* ===== META ===== */
.article-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.meta-category {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  background: var(--ink);
  color: #fff;
  padding: 3px 10px;
  border-radius: 20px;
}
.meta-updated {
  font-size: 12px;
  color: var(--text3);
}

/* ===== ARTICLE TITLE ===== */
.article-title {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--bg3);
}
@media(max-width: 600px) {
  .article-title { font-size: 20px; }
}

/* ===== ARTICLE BODY ===== */
.article-body { color: var(--ink); }

.article-body h2 {
  font-size: 19px;
  font-weight: 700;
  margin: 40px 0 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--bg3);
  color: var(--text);
  line-height: 1.4;
}
.article-body h2[id^="term-section-"] {
  display: flex;
  align-items: center;
  gap: 10px;
}
.article-body {
  counter-reset: term-section;
}
.article-body h2[id^="term-section-"]::before {
  counter-increment: term-section;
  content: counter(term-section);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 26px;
  height: 26px;
  border-radius: 999px;
  background: var(--table-head-bg);
  color: #ffffff;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
}
.article-body h3 {
  font-size: 16px;
  font-weight: 700;
  margin: 28px 0 12px;
  color: var(--ink);
}
.article-body p {
  margin-bottom: 16px;
  line-height: 1.85;
  color: var(--ink);
  font-weight: 400;
}
.article-body ul, .article-body ol {
  margin: 0 0 16px 1.4em;
  line-height: 1.85;
}
.article-body li { margin-bottom: 6px; }
.article-body strong { font-weight: 700; }
.article-body a {
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.article-body a:hover {
  color: var(--text);
}

/* ===== TABLE ===== */
.article-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 14px;
  background: var(--bg);
  border-radius: var(--r2);
  overflow: hidden;
  box-shadow: var(--sh);
}
.article-body th {
  background: var(--table-head-bg);
  color: #fff;
  font-weight: 600;
  padding: 10px 14px;
  text-align: left;
  font-size: 13px;
}
.article-body td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.65;
  color: var(--ink);
  font-weight: 400;
}
.article-body tr:last-child td { border-bottom: none; }
.article-body tr:nth-child(even) td { background: var(--bg2); }

/* ===== BLOCKQUOTE (注意ボックス) ===== */
.article-body blockquote {
  background: #fffbea;
  border-left: 4px solid #f59e0b;
  padding: 14px 18px;
  border-radius: 0 var(--r) var(--r) 0;
  margin: 20px 0;
  font-size: 14px;
  color: var(--ink);
  line-height: 1.75;
}
.article-body blockquote p { margin: 0; }
.article-body blockquote strong { color: #92400e; }

/* ===== SEO SUPPORT BLOCKS ===== */
.term-toc,
.term-info-box {
  border: 1px solid var(--border);
  border-radius: var(--r2);
  background: #fafafa;
  padding: 18px 20px;
  margin: 24px 0;
}
.term-toc h2,
.term-info-box h2 {
  margin-top: 0;
}
.term-toc ol {
  margin-bottom: 0;
}
.term-toc a {
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.term-fact-table {
  margin: 0;
  box-shadow: none;
}
.term-fact-table th {
  width: 140px;
  background: var(--table-head-bg);
  color: #ffffff;
}
.term-fact-table td {
  color: var(--text);
  background: #ffffff;
}
.term-fact-table td a {
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.term-info-box details {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  margin-bottom: 12px;
}
.term-info-box details:last-child {
  margin-bottom: 0;
}
.term-info-box summary {
  cursor: pointer;
  font-weight: 700;
  color: var(--ink);
}
.term-info-box details p {
  margin: 10px 0 0;
}
@media(max-width: 600px) {
  .term-fact-table th,
  .term-fact-table td {
    display: block;
    width: 100%;
  }
}

/* ===== HR ===== */
.article-body hr {
  border: none;
  border-top: 1px solid var(--border2);
  margin: 36px 0;
}

/* ===== FOOTER ===== */
.site-footer {
  border-top: 1px solid var(--border);
  padding: 24px 20px;
  text-align: center;
  font-size: 12px;
  color: var(--text2);
  background: var(--bg);
  margin-top: 40px;
}
.site-footer a { color: var(--ink); text-decoration: none; font-weight: 700; }
.site-footer a:hover { color: var(--text); }
</style>
</head>
<body>

<script>
  // ブラウザのスクロール復元で「下に戻る」を防ぐ（常に先頭表示）
  try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch(_e) {}
  window.scrollTo(0, 0);
</script>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/terms/" class="header-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      用語一覧
    </a>
    <span class="header-sep">›</span>
    <a href="/" class="header-logo">二衛マスター</a>
  </div>
</header>

<div class="page-wrap">
  <nav class="breadcrumb" aria-label="パンくず">
    <a href="/">トップ</a>
    <span class="breadcrumb-sep">›</span>
    <a href="/terms/">用語解説</a>
    <span class="breadcrumb-sep">›</span>
    <span>{{h1}}</span>
  </nav>

  <h1 class="article-title">{{title}}</h1>

  <article class="article-body">
    {{body}}
  </article>

</div>

<footer class="site-footer">
  <a href="/">二衛マスター</a> ｜ 第二種衛生管理者試験 無料学習プラットフォーム
</footer>

</body>
</html>
